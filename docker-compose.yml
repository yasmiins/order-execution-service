services:
  postgres:
    image: postgres:16-alpine
    container_name: order-execution-db
    environment:
      POSTGRES_DB: ordertrade
      POSTGRES_USER: ordertrade
      POSTGRES_PASSWORD: ordertrade
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ordertrade -d ordertrade"]
      interval: 5s
      timeout: 3s
      retries: 5
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ordertrade
      DB_USER: ordertrade
      DB_PASS: ordertrade
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
